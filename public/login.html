<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dropzone Login</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="container auth-shell">
      <section class="auth-card">
        <p class="eyebrow">Pocket ID</p>
        <h1>Admin-Zugang</h1>

        <button id="pocketIdLoginBtn" type="button">Mit Pocket ID anmelden</button>
      </section>
    </main>

    <script type="module" src="/login.js"></script>
  </body>
</html>
