<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FüKw Dropzone</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="container">
      <header class="page-header">
        <div>
          <p class="eyebrow">Dateiübermittlung</p>
          <h1>FüKw Dropzone</h1>
          <p class="lead">Übermitteln Sie Dateien sicher per Drag-and-drop oder über die Dateiauswahl.</p>
        </div>
        <nav class="session-nav" id="sessionNav" hidden>
          <span id="sessionLabel" class="session-label"></span>
          <a id="adminLink" href="/admin">Verwaltung</a>
          <button id="logoutBtn" type="button" class="ghost-btn">Abmelden</button>
        </nav>
      </header>

      <label class="dropzone" id="dropzone" for="files">
        <input id="files" type="file" multiple />
        <span>Dateien hier ablegen oder zur Auswahl klicken</span>
      </label>

      <div class="controls">
        <input id="hint" type="text" maxlength="500" placeholder="Hinweis zur Übermittlung (optional)" />
        <select id="category">
          <option value="">Kategorie auswählen (optional)</option>
          <option value="bilder">Bilder</option>
          <option value="dokumente">Dokumente</option>
          <option value="sonstiges">Sonstiges</option>
        </select>
        <button id="uploadBtn" type="button">Dateien auswählen</button>
      </div>

      <ul id="queue" class="queue"></ul>
      <p id="status" class="status"></p>
    </main>

    <script type="module" src="/app.js"></script>
  </body>
</html>
