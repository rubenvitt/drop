services:
  dropzone:
    build: .
    container_name: fuekw-dropzone
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8080:8080"
    volumes:
      - /srv/fuekw/drop_inbox:/uploads
      - ./data/meta:/data/meta
    healthcheck:
      test: ["CMD", "wget", "-qO", "-", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - dropnet

  caddy:
    image: caddy:2.10-alpine
    container_name: fuekw-dropzone-caddy
    restart: unless-stopped
    profiles: ["tls"]
    depends_on:
      - dropzone
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - dropnet

networks:
  dropnet:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
